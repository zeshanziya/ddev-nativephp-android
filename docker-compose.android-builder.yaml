#ddev-generated
services:
  android-builder:
    build:
      dockerfile_inline: |
        FROM eclipse-temurin:17-jdk-jammy

        # PHP 8.4 CLI + extensions required by Laravel/NativePHP artisan commands
        RUN apt-get update && apt-get install -y software-properties-common curl git unzip wget rsync zip && \
            add-apt-repository ppa:ondrej/php && apt-get update && \
            apt-get install -y \
              php8.4-cli \
              php8.4-xml \
              php8.4-zip \
              php8.4-mbstring \
              php8.4-curl \
              php8.4-sqlite3 \
              php8.4-bcmath \
              php8.4-intl && \
            apt-get clean && rm -rf /var/lib/apt/lists/*

        # Composer
        RUN curl -sS https://getcomposer.org/installer | php -- --install-dir=/usr/local/bin --filename=composer

        # Android SDK command-line tools
        ENV ANDROID_HOME=/opt/android
        ENV PATH=$PATH:/opt/android/cmdline-tools/latest/bin:/opt/android/platform-tools

        RUN mkdir -p /opt/android/cmdline-tools && \
            wget -q https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip \
              -O /tmp/cmdtools.zip && \
            unzip -q /tmp/cmdtools.zip -d /opt/android/cmdline-tools && \
            mv /opt/android/cmdline-tools/cmdline-tools /opt/android/cmdline-tools/latest && \
            rm /tmp/cmdtools.zip

        # Accept licenses and install SDK components used by NativePHP Mobile v3
        RUN yes | sdkmanager --licenses && \
            sdkmanager \
              "platform-tools" \
              "build-tools;35.0.0" \
              "platforms;android-36"

        WORKDIR /var/www/html

    command: ["tail", "-f", "/dev/null"]
    volumes:
      - "${DDEV_APPROOT}:/var/www/html"
      - "gradle-cache:/root/.gradle"
    environment:
      - ANDROID_HOME=/opt/android
      - PATH=/opt/java/openjdk/bin:/opt/android/cmdline-tools/latest/bin:/opt/android/platform-tools:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
    restart: unless-stopped
    labels:
      com.ddev.site-name: ${DDEV_SITENAME}
      com.ddev.approot: ${DDEV_APPROOT}

volumes:
  gradle-cache:
